<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      padding: 20px;
      user-select: none;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #e94560 0%, #8b1a4a 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    /* Site warning */
    .site-warning {
      background: rgba(255, 170, 50, 0.1);
      border: 1px solid rgba(255, 170, 50, 0.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11.5px;
      color: #ffaa32;
      line-height: 1.4;
      margin-bottom: 14px;
      display: none;
    }

    /* Toggle row */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #161625;
      border: 1px solid #1e1e35;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #333;
      border-radius: 24px;
      transition: background 0.2s ease;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s ease;
    }

    .switch input:checked + .slider {
      background: #e94560;
    }

    .switch input:checked + .slider::before {
      transform: translateX(20px);
    }

    .switch input:focus-visible + .slider {
      outline: 2px solid #e94560;
      outline-offset: 2px;
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat-box {
      flex: 1;
      background: #161625;
      border: 1px solid #1e1e35;
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      color: #555;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Status badge */
    .status {
      text-align: center;
      padding: 9px;
      border-radius: 8px;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    .status.active {
      background: rgba(46, 213, 115, 0.12);
      color: #2ed573;
      border: 1px solid rgba(46, 213, 115, 0.2);
    }

    .status.inactive {
      background: rgba(233, 69, 96, 0.12);
      color: #e94560;
      border: 1px solid rgba(233, 69, 96, 0.2);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Anghami Ad Blocker</h1>
      <p>play.anghami.com</p>
    </div>
  </div>

  <div id="siteWarning" class="site-warning">
    This extension only works on play.anghami.com. Navigate there to activate blocking.
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Ad Blocking</span>
    <label class="switch">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-value" id="networkCount">0</div>
      <div class="stat-label">Network Blocked</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="domCount">0</div>
      <div class="stat-label">DOM Removed</div>
    </div>
  </div>

  <div id="status" class="status active">Blocking Active</div>

  <script src="popup.js"></script>
</body>
</html>
